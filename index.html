<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Minhas Músicas</title>
<meta name="description" content="Gerencie e toque as músicas baixadas no seu celular." />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1a1015" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Minhas Músicas" />

<link rel="icon" href="icons/icon-192.png" />

<style>
  :root{
    --bg:#1a1015; --surface:#241419; --accent:#ff6b4a; --accent2:#ffb199; --text:#f5e9e4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; overscroll-behavior-y:none;}
  body{
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:var(--bg); color:var(--text);
    transition:background .4s ease, color .4s ease;
    min-height:100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  button{font-family:inherit; border:none; background:none; color:inherit; cursor:pointer;}
  input[type=range]{-webkit-appearance:none; appearance:none; height:6px; border-radius:99px; outline:none;}
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:var(--accent); border:2px solid var(--text);
  }
  .hidden{display:none !important;}
  .screen-pad{padding:0 20px;}

  /* ---------- Header ---------- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:env(safe-area-inset-top,20px) 20px 12px 20px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-icon{
    width:38px; height:38px; border-radius:12px; background:var(--accent);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .brand-icon svg{width:19px; height:19px;}
  .brand h1{font-size:17px; font-weight:800; margin:0; letter-spacing:-0.02em; line-height:1.1;}
  .brand p{font-size:11px; opacity:.6; margin:2px 0 0 0;}
  .icon-btn{
    width:40px; height:40px; border-radius:50%; background:var(--surface);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:transform .15s ease;
  }
  .icon-btn:active{transform:scale(0.9);}
  .icon-btn svg{width:18px; height:18px; color:var(--accent);}

  /* ---------- Upload ---------- */
  .upload-label{
    display:flex; align-items:center; justify-content:center; gap:8px;
    border:2px dashed color-mix(in srgb, var(--accent) 35%, transparent);
    border-radius:18px; padding:16px; color:var(--accent);
    font-size:14px; font-weight:700; margin:0 20px 14px 20px;
    transition:opacity .15s ease;
  }
  .upload-label:active{opacity:.65;}
  .upload-label svg{width:17px; height:17px;}
  #file-input{position:absolute; width:1px; height:1px; opacity:0; overflow:hidden;}
  #upload-error{font-size:12px; text-align:center; margin:8px 20px 0 20px; color:var(--accent); display:none;}

  /* ---------- Player ---------- */
  .player-card{
    margin:0 20px 16px 20px; border-radius:26px; padding:20px;
    background:var(--surface); display:flex; flex-direction:column; align-items:center;
  }
  .cover{
    width:150px; height:150px; border-radius:20px; margin-bottom:16px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 30px -10px color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .cover svg{width:36px; height:36px; opacity:.5; color:var(--accent);}
  .track-info{text-align:center; margin-bottom:14px; padding:0 8px; width:100%;}
  .track-info p.name{font-weight:700; font-size:15px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .track-info p.status{font-size:11px; opacity:.6; margin:3px 0 0 0;}

  .seek-bar{width:100%; height:7px; border-radius:99px; background:var(--bg); margin-bottom:6px; cursor:pointer; position:relative;}
  .seek-fill{height:100%; border-radius:99px; background:var(--accent); width:0%;}
  .time-row{display:flex; justify-content:space-between; font-size:11px; opacity:.6; margin-bottom:16px;}

  .controls{display:flex; align-items:center; gap:20px; margin-bottom:14px;}
  .controls button{display:flex; align-items:center; justify-content:center; opacity:.55; transition:opacity .15s, transform .15s;}
  .controls button.active{opacity:1; color:var(--accent);}
  .controls button:active{transform:scale(0.88);}
  .controls svg{width:19px; height:19px;}
  .controls .skip svg{width:25px; height:25px; opacity:.9; color:var(--text);}
  .play-btn{
    width:58px; height:58px; border-radius:50%; background:var(--accent);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:transform .15s ease;
  }
  .play-btn:active{transform:scale(0.93);}
  .play-btn svg{width:24px; height:24px; color:var(--bg);}
  .repeat-badge{position:absolute; top:-4px; right:-6px; font-size:8px; font-weight:800;}

  .volume-row{display:flex; align-items:center; gap:10px; width:100%;}
  .volume-row svg{width:16px; height:16px; opacity:.6; flex-shrink:0;}
  #volume{flex:1; background:linear-gradient(to right, var(--accent) 85%, var(--bg) 85%);}

  /* ---------- Fila ---------- */
  .queue-header{display:flex; align-items:center; gap:8px; margin:0 20px 10px 20px;}
  .queue-header svg{width:16px; height:16px; color:var(--accent);}
  .queue-header h2{font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; opacity:.8; margin:0;}

  #queue-empty{margin:0 20px; border-radius:18px; background:var(--surface); padding:32px 16px; text-align:center; font-size:13px; opacity:.5;}

  #queue-list{list-style:none; margin:0; padding:0 20px 100px 20px; display:flex; flex-direction:column; gap:8px;}
  .queue-item{
    display:flex; align-items:center; gap:10px; border-radius:14px; padding:10px 12px;
    background:var(--surface); border:1.5px solid transparent; transition:background .2s, opacity .2s;
  }
  .queue-item.current{background:color-mix(in srgb, var(--accent) 14%, var(--surface));}
  .queue-item.drag-over{border-color:var(--accent); border-style:dashed;}
  .queue-item.dragging{opacity:.35;}
  .handle{opacity:.35; display:flex; align-items:center; touch-action:none; cursor:grab; padding:4px;}
  .handle svg{width:16px; height:16px;}
  .mini-cover{
    width:36px; height:36px; border-radius:9px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .mini-cover svg{width:13px; height:13px; color:var(--bg);}
  .item-meta{flex:1; min-width:0;}
  .item-meta p.name{font-size:14px; font-weight:600; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item-meta p.dur{font-size:11px; opacity:.5; margin:2px 0 0 0;}
  .remove-btn{padding:6px; opacity:.4;}
  .remove-btn svg{width:15px; height:15px;}

  /* ---------- Modal de temas ---------- */
  #theme-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:flex-end; justify-content:center; z-index:50;
  }
  #theme-sheet{
    width:100%; max-width:480px; border-radius:26px 26px 0 0; padding:20px 20px calc(28px + env(safe-area-inset-bottom)) 20px;
    background:var(--surface);
  }
  .sheet-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .sheet-head h3{font-size:16px; font-weight:800; margin:0;}
  .sheet-head button svg{width:20px; height:20px;}
  #theme-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .theme-swatch{
    border-radius:16px; padding:12px 6px; display:flex; flex-direction:column; align-items:center; gap:7px;
    border:2px solid transparent; transition:transform .15s;
  }
  .theme-swatch:active{transform:scale(0.95);}
  .theme-swatch .dot{width:32px; height:32px; border-radius:50%;}
  .theme-swatch span{font-size:11.5px; font-weight:600;}

  /* ---------- Install banner ---------- */
  #install-banner{
    position:fixed; left:14px; right:14px; bottom:calc(14px + env(safe-area-inset-bottom));
    background:var(--accent); color:var(--bg); border-radius:16px; padding:13px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; z-index:40;
    box-shadow:0 8px 24px -8px rgba(0,0,0,.5);
  }
  #install-banner p{font-size:13px; font-weight:700; margin:0; flex:1;}
  #install-banner button.go{background:var(--bg); color:var(--accent); padding:8px 14px; border-radius:10px; font-size:12.5px; font-weight:800; flex-shrink:0;}
  #install-banner button.dismiss{padding:6px; opacity:.7; flex-shrink:0;}
  #install-banner button.dismiss svg{width:16px; height:16px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--bg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </div>
    <div>
      <h1>Minhas Músicas</h1>
      <p id="track-count">0 faixas</p>
    </div>
  </div>
  <button class="icon-btn" id="theme-toggle" aria-label="Mudar cores do app">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.93 0 1.5-.78 1.5-1.5 0-.39-.16-.74-.4-1.01-.23-.26-.4-.61-.4-1 0-.83.67-1.49 1.5-1.49H16c3.31 0 6-2.69 6-6 0-5.52-4.91-9-10-9z"/></svg>
  </button>
</header>

<label class="upload-label" id="upload-label" for="file-input">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  <span>Abrir gerenciador de arquivos</span>
  <input type="file" id="file-input" accept="audio/*" multiple />
</label>
<p id="upload-error"></p>

<div class="player-card">
  <div class="cover" id="cover">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  </div>
  <div class="track-info">
    <p class="name" id="track-name">Nenhuma música selecionada</p>
    <p class="status" id="track-status">Adicione músicas para começar</p>
  </div>

  <div class="seek-bar" id="seek-bar"><div class="seek-fill" id="seek-fill"></div></div>
  <div class="time-row"><span id="time-current">0:00</span><span id="time-total">0:00</span></div>

  <div class="controls">
    <button id="btn-shuffle" aria-label="Embaralhar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
    </button>
    <button class="skip" id="btn-prev" aria-label="Faixa anterior">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>
    <button class="play-btn" id="btn-play" aria-label="Reproduzir">
      <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="skip" id="btn-next" aria-label="Próxima faixa">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M16 6h2v12h-2zm-9.5 6L15 18V6z"/></svg>
    </button>
    <button id="btn-repeat" aria-label="Repetir" style="position:relative;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      <span class="repeat-badge" id="repeat-badge"></span>
    </button>
  </div>

  <div class="volume-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.85" />
  </div>
</div>

<div class="queue-header">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  <h2>Fila de reprodução</h2>
</div>
<div id="queue-empty">Sua fila está vazia. Adicione músicas para montá-la.</div>
<ul id="queue-list"></ul>

<audio id="audio"></audio>

<!-- Modal de temas -->
<div id="theme-overlay" class="hidden">
  <div id="theme-sheet">
    <div class="sheet-head">
      <h3>Cor de fundo do app</h3>
      <button id="theme-close" aria-label="Fechar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="theme-grid"></div>
  </div>
</div>

<!-- Banner de instalação -->
<div id="install-banner" class="hidden">
  <p>Instale o app na tela inicial para acesso completo aos seus arquivos.</p>
  <button class="go" id="install-go">Instalar</button>
  <button class="dismiss" id="install-dismiss" aria-label="Fechar aviso">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<script>
// ---------- Temas ----------
const THEMES = [
  { id: "ember",   name: "Brasa",     bg: "#1a1015", surface: "#241419", accent: "#ff6b4a", accent2: "#ffb199", text: "#f5e9e4" },
  { id: "depths",  name: "Profundo",  bg: "#0c1420", surface: "#13202f", accent: "#3ab0ff", accent2: "#8fd9ff", text: "#e7f1fb" },
  { id: "moss",    name: "Musgo",     bg: "#101510", surface: "#19211a", accent: "#7ed957", accent2: "#c2f0a8", text: "#eef5ea" },
  { id: "orchid",  name: "Orquídea",  bg: "#160d1c", surface: "#221329", accent: "#c861f0", accent2: "#eab8ff", text: "#f3e8f7" },
  { id: "amber",   name: "Âmbar",     bg: "#1c1608", surface: "#28200d", accent: "#f0b429", accent2: "#ffe08a", text: "#f7f0dd" },
  { id: "slate",   name: "Ardósia",   bg: "#13151a", surface: "#1d2027", accent: "#9aa6ff", accent2: "#c9d0ff", text: "#eef0f7" },
];

const THEME_STORAGE_KEY = "minhas-musicas:theme";

// ---------- IndexedDB (persistência real dos arquivos de música) ----------
const DB_NAME = "minhas-musicas-db";
const DB_VERSION = 1;
const STORE_TRACKS = "tracks";   // guarda { id, name, blob, duration }
const STORE_META = "meta";        // guarda { key: "queue", value: [...ids] } e { key: "currentIndex", value: n }

let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const _db = e.target.result;
      if (!_db.objectStoreNames.contains(STORE_TRACKS)) {
        _db.createObjectStore(STORE_TRACKS, { keyPath: "id" });
      }
      if (!_db.objectStoreNames.contains(STORE_META)) {
        _db.createObjectStore(STORE_META, { keyPath: "key" });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function idbPut(storeName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, "readwrite");
    tx.objectStore(storeName).put(value);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

function idbDelete(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, "readwrite");
    tx.objectStore(storeName).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

function idbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, "readonly");
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = (e) => reject(e.target.error);
  });
}

function idbGet(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, "readonly");
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function saveQueueMeta() {
  try {
    await idbPut(STORE_META, { key: "queue", value: queue });
    await idbPut(STORE_META, { key: "currentIndex", value: currentIndex });
  } catch (err) {
    console.error("Erro salvando fila:", err);
  }
}

// ---------- Estado ----------
let tracks = [];       // {id, name, blob, url, duration}
let queue = [];         // array de ids na ordem de reprodução
let currentIndex = -1;
let isPlaying = false;
let repeatMode = "off"; // off | one | all
let shuffleOn = false;
let dragIndex = null;

const audio = document.getElementById("audio");
const fileInput = document.getElementById("file-input");
const uploadLabel = document.getElementById("upload-label");
const uploadError = document.getElementById("upload-error");
const trackCountEl = document.getElementById("track-count");
const coverEl = document.getElementById("cover");
const trackNameEl = document.getElementById("track-name");
const trackStatusEl = document.getElementById("track-status");
const seekBar = document.getElementById("seek-bar");
const seekFill = document.getElementById("seek-fill");
const timeCurrent = document.getElementById("time-current");
const timeTotal = document.getElementById("time-total");
const playBtn = document.getElementById("btn-play");
const playIcon = document.getElementById("play-icon");
const prevBtn = document.getElementById("btn-prev");
const nextBtn = document.getElementById("btn-next");
const shuffleBtn = document.getElementById("btn-shuffle");
const repeatBtn = document.getElementById("btn-repeat");
const repeatBadge = document.getElementById("repeat-badge");
const volumeSlider = document.getElementById("volume");
const queueListEl = document.getElementById("queue-list");
const queueEmptyEl = document.getElementById("queue-empty");
const themeToggle = document.getElementById("theme-toggle");
const themeOverlay = document.getElementById("theme-overlay");
const themeClose = document.getElementById("theme-close");
const themeGrid = document.getElementById("theme-grid");

const PLAY_ICON = '<path d="M8 5v14l11-7z"/>';
const PAUSE_ICON = '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>';

// ---------- Util ----------
function formatTime(s) {
  if (!isFinite(s) || s < 0) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, "0")}`;
}

function coverGradient(seedStr, accent, accent2) {
  let h = 0;
  for (let i = 0; i < seedStr.length; i++) h = (h * 31 + seedStr.charCodeAt(i)) % 360;
  return `conic-gradient(from ${h}deg, ${accent}, ${accent2}, ${accent})`;
}

function currentTrack() {
  if (currentIndex < 0 || currentIndex >= queue.length) return null;
  const id = queue[currentIndex];
  return tracks.find((t) => t.id === id) || null;
}

function setUploadBusy(busy, label) {
  uploadLabel.style.opacity = busy ? "0.6" : "1";
  uploadLabel.querySelector("span").textContent = label;
}

// ---------- Temas ----------
function applyTheme(theme) {
  const root = document.documentElement.style;
  root.setProperty("--bg", theme.bg);
  root.setProperty("--surface", theme.surface);
  root.setProperty("--accent", theme.accent);
  root.setProperty("--accent2", theme.accent2);
  root.setProperty("--text", theme.text);
  document.querySelector('meta[name="theme-color"]').setAttribute("content", theme.bg);
  renderQueue();
  renderCover();
}

function loadTheme() {
  const savedId = localStorage.getItem(THEME_STORAGE_KEY);
  const theme = THEMES.find((t) => t.id === savedId) || THEMES[0];
  applyTheme(theme);
  return theme;
}

function saveTheme(theme) {
  localStorage.setItem(THEME_STORAGE_KEY, theme.id);
  applyTheme(theme);
}

function buildThemeGrid() {
  themeGrid.innerHTML = "";
  const currentId = localStorage.getItem(THEME_STORAGE_KEY) || THEMES[0].id;
  THEMES.forEach((theme) => {
    const btn = document.createElement("button");
    btn.className = "theme-swatch";
    btn.style.background = theme.bg;
    btn.style.borderColor = theme.id === currentId ? theme.accent : "transparent";
    btn.innerHTML = `
      <div class="dot" style="background:linear-gradient(135deg, ${theme.accent}, ${theme.accent2})"></div>
      <span style="color:${theme.text}">${theme.name}</span>
    `;
    btn.addEventListener("click", () => {
      saveTheme(theme);
      themeOverlay.classList.add("hidden");
      buildThemeGrid();
    });
    themeGrid.appendChild(btn);
  });
}

themeToggle.addEventListener("click", () => {
  buildThemeGrid();
  themeOverlay.classList.remove("hidden");
});
themeClose.addEventListener("click", () => themeOverlay.classList.add("hidden"));
themeOverlay.addEventListener("click", (e) => {
  if (e.target === themeOverlay) themeOverlay.classList.add("hidden");
});

// ---------- Upload (com gravação permanente em IndexedDB) ----------
const AUDIO_EXT = /\.(mp3|wav|m4a|aac|ogg|flac|wma|opus)$/i;

fileInput.addEventListener("change", async (e) => {
  const files = Array.from(e.target.files || []);
  await handleFiles(files);
  e.target.value = "";
});

async function handleFiles(files) {
  if (files.length === 0) return;
  const audioFiles = files.filter((f) => f.type.startsWith("audio/") || AUDIO_EXT.test(f.name));

  if (audioFiles.length === 0) {
    uploadError.textContent = "Nenhum arquivo de áudio reconhecido. Escolha .mp3, .m4a, .wav ou similares.";
    uploadError.style.display = "block";
    return;
  }
  uploadError.style.display = "none";

  setUploadBusy(true, `Salvando 0/${audioFiles.length}...`);

  const newIds = [];
  for (let i = 0; i < audioFiles.length; i++) {
    const file = audioFiles[i];
    const id = `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
    const name = file.name.replace(/\.[^/.]+$/, "");

    try {
      // Salva o Blob direto no IndexedDB (armazenamento permanente em disco, não na RAM)
      await idbPut(STORE_TRACKS, { id, name, blob: file, duration: 0 });
      const url = URL.createObjectURL(file);
      tracks.push({ id, name, blob: file, url, duration: 0 });
      newIds.push(id);
      setUploadBusy(true, `Salvando ${i + 1}/${audioFiles.length}...`);
    } catch (err) {
      console.error("Erro ao salvar música:", err);
    }
  }

  queue = queue.concat(newIds);
  await saveQueueMeta();

  setUploadBusy(false, "Abrir gerenciador de arquivos");
  renderQueue();
  updateTrackCount();

  if (currentIndex === -1 && queue.length > 0) {
    loadTrackAt(0, false);
  }
}

function updateTrackCount() {
  trackCountEl.textContent = `${tracks.length} faixa${tracks.length !== 1 ? "s" : ""}`;
}

// ---------- Player ----------
function loadTrackAt(index, autoplay = true) {
  const id = queue[index];
  const track = tracks.find((t) => t.id === id);
  if (!track) return;
  currentIndex = index;
  audio.src = track.url;
  audio.volume = parseFloat(volumeSlider.value);
  renderCover();
  renderTrackInfo();
  renderQueue();
  saveQueueMeta();
  if (autoplay) {
    audio.play().then(() => { isPlaying = true; updatePlayIcon(); }).catch(() => {
      isPlaying = false; updatePlayIcon();
    });
  }
}

function renderCover() {
  const track = currentTrack();
  const theme = getActiveThemeValues();
  if (track) {
    coverEl.style.background = coverGradient(track.name, theme.accent, theme.accent2);
    coverEl.innerHTML = "";
  } else {
    coverEl.style.background = "transparent";
    coverEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
  }
}

function getActiveThemeValues() {
  const cs = getComputedStyle(document.documentElement);
  return {
    accent: cs.getPropertyValue("--accent").trim(),
    accent2: cs.getPropertyValue("--accent2").trim(),
  };
}

function renderTrackInfo() {
  const track = currentTrack();
  trackNameEl.textContent = track ? track.name : "Nenhuma música selecionada";
  trackStatusEl.textContent = track ? "Tocando agora" : "Adicione músicas para começar";
}

function updatePlayIcon() {
  playIcon.innerHTML = isPlaying ? PAUSE_ICON : PLAY_ICON;
}

function togglePlay() {
  if (!currentTrack()) {
    if (queue.length > 0) loadTrackAt(0, true);
    return;
  }
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
  } else {
    audio.play().then(() => { isPlaying = true; updatePlayIcon(); renderQueue(); }).catch(() => {});
    return;
  }
  updatePlayIcon();
  renderQueue();
}

function goNext() {
  if (queue.length === 0) return;
  if (shuffleOn) {
    let next = Math.floor(Math.random() * queue.length);
    if (queue.length > 1 && next === currentIndex) next = (next + 1) % queue.length;
    loadTrackAt(next, true);
    return;
  }
  const next = currentIndex + 1;
  if (next < queue.length) loadTrackAt(next, true);
  else if (repeatMode === "all") loadTrackAt(0, true);
  else { isPlaying = false; updatePlayIcon(); }
}

function goPrev() {
  if (queue.length === 0) return;
  if (audio.currentTime > 3) {
    audio.currentTime = 0;
    return;
  }
  const prev = currentIndex - 1;
  if (prev >= 0) loadTrackAt(prev, true);
  else loadTrackAt(queue.length - 1, true);
}

audio.addEventListener("ended", () => {
  if (repeatMode === "one") {
    audio.currentTime = 0;
    audio.play();
    return;
  }
  goNext();
});

audio.addEventListener("timeupdate", () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  seekFill.style.width = `${pct}%`;
  timeCurrent.textContent = formatTime(audio.currentTime);
});

audio.addEventListener("loadedmetadata", async () => {
  timeTotal.textContent = formatTime(audio.duration);
  const track = currentTrack();
  if (track) {
    track.duration = audio.duration;
    renderQueue();
    // Atualiza a duração salva permanentemente
    try {
      const stored = await idbGet(STORE_TRACKS, track.id);
      if (stored) {
        stored.duration = audio.duration;
        await idbPut(STORE_TRACKS, stored);
      }
    } catch (err) { /* silencioso */ }
  }
});

seekBar.addEventListener("click", (e) => {
  const rect = seekBar.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  if (audio.duration) audio.currentTime = ratio * audio.duration;
});

playBtn.addEventListener("click", togglePlay);
nextBtn.addEventListener("click", goNext);
prevBtn.addEventListener("click", goPrev);

shuffleBtn.addEventListener("click", () => {
  shuffleOn = !shuffleOn;
  shuffleBtn.classList.toggle("active", shuffleOn);
});

repeatBtn.addEventListener("click", () => {
  repeatMode = repeatMode === "off" ? "all" : repeatMode === "all" ? "one" : "off";
  repeatBtn.classList.toggle("active", repeatMode !== "off");
  repeatBadge.textContent = repeatMode === "one" ? "1" : "";
});

volumeSlider.addEventListener("input", () => {
  const v = parseFloat(volumeSlider.value);
  audio.volume = v;
  volumeSlider.style.background = `linear-gradient(to right, var(--accent) ${v * 100}%, var(--bg) ${v * 100}%)`;
});

// ---------- Fila (drag-and-drop) ----------
function renderQueue() {
  queueListEl.innerHTML = "";
  const queueTracks = queue.map((id) => tracks.find((t) => t.id === id)).filter(Boolean);

  queueEmptyEl.style.display = queueTracks.length === 0 ? "block" : "none";
  queueListEl.style.display = queueTracks.length === 0 ? "none" : "flex";

  const theme = getActiveThemeValues();

  queueTracks.forEach((track, index) => {
    const li = document.createElement("li");
    li.className = "queue-item" + (index === currentIndex ? " current" : "");
    li.draggable = true;
    li.dataset.index = index;

    const isCurrentlyPlaying = index === currentIndex && isPlaying;

    li.innerHTML = `
      <span class="handle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>
      </span>
      <button class="mini-cover" style="background:${coverGradient(track.name, theme.accent, theme.accent2)}" aria-label="Tocar ${track.name}">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">${isCurrentlyPlaying ? PAUSE_ICON : PLAY_ICON}</svg>
      </button>
      <div class="item-meta">
        <p class="name" style="${index === currentIndex ? "color:var(--accent)" : ""}">${escapeHtml(track.name)}</p>
        <p class="dur">${track.duration ? formatTime(track.duration) : "—"}</p>
      </div>
      <button class="remove-btn" aria-label="Remover da fila">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    `;

    li.querySelector(".mini-cover").addEventListener("click", () => loadTrackAt(index, true));
    li.querySelector(".item-meta").addEventListener("click", () => loadTrackAt(index, true));
    li.querySelector(".remove-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      removeFromQueue(index);
    });

    // Drag events (desktop)
    li.addEventListener("dragstart", () => { dragIndex = index; li.classList.add("dragging"); });
    li.addEventListener("dragend", () => { dragIndex = null; li.classList.remove("dragging"); clearDragOverStyles(); });
    li.addEventListener("dragover", (e) => {
      e.preventDefault();
      clearDragOverStyles();
      li.classList.add("drag-over");
    });
    li.addEventListener("drop", (e) => {
      e.preventDefault();
      if (dragIndex !== null) reorderQueue(dragIndex, index);
      clearDragOverStyles();
    });

    // Touch support (mobile) via long-press handle drag
    setupTouchDrag(li, index);

    queueListEl.appendChild(li);
  });

  updateTrackCount();
}

function clearDragOverStyles() {
  document.querySelectorAll(".queue-item.drag-over").forEach((el) => el.classList.remove("drag-over"));
}

function reorderQueue(fromIndex, toIndex) {
  if (fromIndex === toIndex) return;
  const moved = queue.splice(fromIndex, 1)[0];
  queue.splice(toIndex, 0, moved);

  if (currentIndex === fromIndex) currentIndex = toIndex;
  else if (fromIndex < currentIndex && toIndex >= currentIndex) currentIndex -= 1;
  else if (fromIndex > currentIndex && toIndex <= currentIndex) currentIndex += 1;

  renderQueue();
  saveQueueMeta();
}

async function removeFromQueue(index) {
  const removedId = queue[index];
  queue.splice(index, 1);
  tracks = tracks.filter((t) => t.id !== removedId);

  if (index === currentIndex) {
    audio.pause();
    isPlaying = false;
    currentIndex = -1;
    renderCover();
    renderTrackInfo();
    updatePlayIcon();
  } else if (index < currentIndex) {
    currentIndex -= 1;
  }
  renderQueue();

  try {
    await idbDelete(STORE_TRACKS, removedId);
    await saveQueueMeta();
  } catch (err) {
    console.error("Erro removendo música salva:", err);
  }
}

// Touch drag-and-drop simples baseado na alça
function setupTouchDrag(li, index) {
  const handle = li.querySelector(".handle");
  let startY = 0;
  let dragging = false;

  handle.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
    dragging = true;
    dragIndex = parseInt(li.dataset.index, 10);
    li.classList.add("dragging");
    li.style.position = "relative";
    li.style.zIndex = "10";
  }, { passive: true });

  handle.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    const touchY = e.touches[0].clientY;
    li.style.transform = `translateY(${touchY - startY}px)`;

    const items = Array.from(queueListEl.children);
    const overEl = items.find((el) => {
      const rect = el.getBoundingClientRect();
      return touchY >= rect.top && touchY <= rect.bottom;
    });
    clearDragOverStyles();
    if (overEl && overEl !== li) overEl.classList.add("drag-over");
  }, { passive: true });

  handle.addEventListener("touchend", (e) => {
    if (!dragging) return;
    dragging = false;
    li.style.transform = "";
    li.style.zIndex = "";
    li.classList.remove("dragging");

    const touchY = e.changedTouches[0].clientY;
    const items = Array.from(queueListEl.children);
    const overEl = items.find((el) => {
      const rect = el.getBoundingClientRect();
      return touchY >= rect.top && touchY <= rect.bottom;
    });
    clearDragOverStyles();
    if (overEl) {
      const toIndex = parseInt(overEl.dataset.index, 10);
      if (dragIndex !== null) reorderQueue(dragIndex, toIndex);
    }
    dragIndex = null;
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ---------- Carregar dados salvos ao iniciar ----------
async function loadPersistedData() {
  try {
    db = await openDB();
  } catch (err) {
    console.error("IndexedDB indisponível:", err);
    return;
  }

  try {
    const [storedTracks, queueMeta, indexMeta] = await Promise.all([
      idbGetAll(STORE_TRACKS),
      idbGet(STORE_META, "queue"),
      idbGet(STORE_META, "currentIndex"),
    ]);

    tracks = storedTracks.map((t) => ({
      id: t.id,
      name: t.name,
      blob: t.blob,
      url: URL.createObjectURL(t.blob),
      duration: t.duration || 0,
    }));

    const savedQueue = (queueMeta && queueMeta.value) || [];
    // Mantém apenas ids que realmente existem em tracks (evita fila com itens fantasmas)
    queue = savedQueue.filter((id) => tracks.some((t) => t.id === id));
    // Acrescenta quaisquer faixas salvas que não estavam na fila por algum motivo
    tracks.forEach((t) => { if (!queue.includes(t.id)) queue.push(t.id); });

    const savedIndex = (indexMeta && typeof indexMeta.value === "number") ? indexMeta.value : -1;
    currentIndex = savedIndex >= 0 && savedIndex < queue.length ? savedIndex : -1;

    renderQueue();
    updateTrackCount();
    if (currentIndex >= 0) {
      const track = currentTrack();
      if (track) {
        audio.src = track.url;
        renderCover();
        renderTrackInfo();
      }
    }
  } catch (err) {
    console.error("Erro ao carregar dados salvos:", err);
  }
}

// ---------- Instalação do PWA ----------
let deferredPrompt = null;
const installBanner = document.getElementById("install-banner");
const installGo = document.getElementById("install-go");
const installDismiss = document.getElementById("install-dismiss");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem("install-dismissed")) {
    installBanner.classList.remove("hidden");
  }
});

installGo.addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
  installBanner.classList.add("hidden");
});

installDismiss.addEventListener("click", () => {
  installBanner.classList.add("hidden");
  localStorage.setItem("install-dismissed", "1");
});

// ---------- Service worker ----------
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}

// ---------- Init ----------
loadTheme();
volumeSlider.dispatchEvent(new Event("input"));
loadPersistedData();

</script>
